name: build

on:
  push:
    branches: main
    paths:
      - "!**.md"
      - ".github/workflows/build.yml"
      - "packages/**"
      - "test/**"
      - ".esbuildrc.js"
      - ".eslintrc.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 16
      - run: npm i -g pnpm
      - run: pnpm i
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm test
