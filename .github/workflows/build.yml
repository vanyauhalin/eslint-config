name: build

on:
  push:
    branches: main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 12
      - run: npm i -g pnpm
      - run: pnpm i
      - run: pnpm build-base
      - run: pnpm lint
      - run: pnpm test-base
